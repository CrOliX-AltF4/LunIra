name: Stale

on:
  schedule:
    - cron: '0 9 * * 1' # every Monday at 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            any activity in the last 60 days. It will be closed in 14 days unless
            it receives a new comment or the `stale` label is removed.
          close-issue-message: |
            This issue was closed automatically after 14 days of inactivity.
            Feel free to reopen it if the issue is still relevant.

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had
            any activity in the last 30 days. It will be closed in 7 days unless
            it receives a new comment or the `stale` label is removed.
          close-pr-message: |
            This PR was closed automatically after 7 days of inactivity.
            Feel free to reopen it if the work is still ongoing.

          # Never mark these as stale
          exempt-issue-labels: 'pinned,security,roadmap'
          exempt-pr-labels: 'pinned,security'
          exempt-all-assignees: true
