name: Sync dev

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  sync:
    name: Reset dev to master
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset dev to master
        run: git push origin HEAD:dev --force
